version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gauri_mobile_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gauri_mobiles
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: gauri_user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Mount the initialization script so it runs automatically on first boot
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
